# xcodegen project spec for SlicePal
# Generate with: cd app && xcodegen
# Then open:     open SlicePal.xcodeproj
#
# Prerequisites:
#   • Run build.sh (or at least up through 11_xcframework.sh) so that
#     libslic3r.xcframework exists at app/libslic3r.xcframework
#   • All deps installed in ~/ios-sysroot-sim
#   • Copy app/project.local.yml.example to app/project.local.yml and fill in your team ID

includes:
  - path: project.local.yml
    optional: true

name: PalmSlice
options:
  bundleIdPrefix: com.adickin
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  PalmSlice:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    # ── Source files ────────────────────────────────────────────
    sources:
      - path: SlicePal
        excludes:
          - "**/.DS_Store"

    # ── Linked frameworks ───────────────────────────────────────
    # libslic3r.xcframework is generated by script 11.
    # All other deps are linked via OTHER_LDFLAGS below.
    dependencies:
      - framework: libslic3r.xcframework
        embed: false    # static lib inside XCF — no embed needed
      - sdk: libc++.tbd
      - sdk: SceneKit.framework

    # ── Build settings ──────────────────────────────────────────
    settings:
      base:
        # Bridging header — Swift ↔ C bridge
        SWIFT_OBJC_BRIDGING_HEADER: SlicePal/SlicePal-Bridging-Header.h

        # C++ standard (must match how libslic3r was compiled)
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        CLANG_CXX_LIBRARY: libc++

        # Per-SDK sysroot — resolved by Xcode at build time.
        # Simulator → ~/ios-sysroot-sim, Device → ~/ios-sysroot-dev
        "IOS_SYSROOT[sdk=iphonesimulator*]": "$(HOME)/ios-sysroot-sim"
        "IOS_SYSROOT[sdk=iphoneos*]": "$(HOME)/ios-sysroot-dev"

        # Search paths — use $(IOS_SYSROOT) so they resolve per SDK
        HEADER_SEARCH_PATHS: >-
          $(inherited)
          $(IOS_SYSROOT)/include
          $(IOS_SYSROOT)/include/eigen3
          $(IOS_SYSROOT)/include/LibBGCode
          $(HOME)/ios-sources/PrusaSlicer/src
          $(HOME)/ios-sources/PrusaSlicer/src/libslic3r
          $(HOME)/ios-sources/PrusaSlicer/bundled_deps

        LIBRARY_SEARCH_PATHS: >-
          $(inherited)
          $(IOS_SYSROOT)/lib

        # Link all static deps explicitly via $(IOS_SYSROOT).
        OTHER_LDFLAGS: >-
          $(inherited)
          $(IOS_SYSROOT)/lib/libslic3r_cgal.a
          $(IOS_SYSROOT)/lib/libslic3r-arrange.a
          $(IOS_SYSROOT)/lib/libslic3r-arrange-wrapper.a
          $(IOS_SYSROOT)/lib/libadmesh.a
          $(IOS_SYSROOT)/lib/liblocalesutils.a
          $(IOS_SYSROOT)/lib/libminiz_static.a
          $(IOS_SYSROOT)/lib/libqoi.a
          $(IOS_SYSROOT)/lib/libglu-libtess.a
          $(IOS_SYSROOT)/lib/libsemver.a
          $(IOS_SYSROOT)/lib/libclipper.a
          $(IOS_SYSROOT)/lib/libClipper2.a
          $(IOS_SYSROOT)/lib/libClipper2Z.a
          $(IOS_SYSROOT)/lib/libbgcode_core.a
          $(IOS_SYSROOT)/lib/libbgcode_binarize.a
          $(IOS_SYSROOT)/lib/libbgcode_convert.a
          $(IOS_SYSROOT)/lib/libheatshrink.a
          $(IOS_SYSROOT)/lib/libheatshrink_dynalloc.a
          $(IOS_SYSROOT)/lib/libqhullstatic_r.a
          $(IOS_SYSROOT)/lib/libqhullcpp.a
          $(IOS_SYSROOT)/lib/libmpfr.a
          $(IOS_SYSROOT)/lib/libgmpxx.a
          $(IOS_SYSROOT)/lib/libgmp.a
          $(IOS_SYSROOT)/lib/libboost_atomic.a
          $(IOS_SYSROOT)/lib/libboost_chrono.a
          $(IOS_SYSROOT)/lib/libboost_date_time.a
          $(IOS_SYSROOT)/lib/libboost_filesystem.a
          $(IOS_SYSROOT)/lib/libboost_iostreams.a
          $(IOS_SYSROOT)/lib/libboost_log.a
          $(IOS_SYSROOT)/lib/libboost_log_setup.a
          $(IOS_SYSROOT)/lib/libboost_nowide.a
          $(IOS_SYSROOT)/lib/libboost_program_options.a
          $(IOS_SYSROOT)/lib/libboost_regex.a
          $(IOS_SYSROOT)/lib/libboost_system.a
          $(IOS_SYSROOT)/lib/libboost_thread.a
          $(IOS_SYSROOT)/lib/libboost_locale.a
          $(IOS_SYSROOT)/lib/libtbb.a
          $(IOS_SYSROOT)/lib/libtbbmalloc.a
          $(IOS_SYSROOT)/lib/libexpat.a
          $(IOS_SYSROOT)/lib/libpng.a
          $(IOS_SYSROOT)/lib/libz.a

        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

        # No bitcode (deprecated in Xcode 14+; required OFF for cross-compiled libs)
        ENABLE_BITCODE: NO

        # Required for mixed Swift + C++ projects
        SWIFT_VERSION: 5.9

        # Simulator runs on Apple Silicon as arm64
        ARCHS: arm64
        VALID_ARCHS: arm64

        # Suppress warnings from libslic3r headers we don't own
        GCC_WARN_INHIBIT_ALL_WARNINGS: NO
        CLANG_WARN_EVERYTHING: NO

      debug:
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"

      release:
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        SWIFT_OPTIMIZATION_LEVEL: "-O"

    # ── Info.plist ──────────────────────────────────────────────
    info:
      path: SlicePal/Info.plist
      properties:
        CFBundleDisplayName: PalmSlice
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"

        # Files app integration — shows app's Documents in the Files browser
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true

        # Required device capabilities
        UIRequiredDeviceCapabilities:
          - arm64

        # Orientations
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        # App targets both iPhone and iPad (iPad support is essentially free)
        UIDeviceFamily:
          - 1   # iPhone
          - 2   # iPad

        UILaunchStoryboardName: LaunchScreen
