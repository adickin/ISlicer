# xcodegen project spec for IosSlicer
# Generate with: cd app && xcodegen
# Then open:     open IosSlicer.xcodeproj
#
# Prerequisites:
#   • Run build.sh (or at least up through 11_xcframework.sh) so that
#     libslic3r.xcframework exists at app/libslic3r.xcframework
#   • All deps installed in ~/ios-sysroot-sim

name: IosSlicer
options:
  bundleIdPrefix: com.yourname          # change to your Apple Developer team prefix
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  IosSlicer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    # ── Source files ────────────────────────────────────────────
    sources:
      - path: IosSlicer
        excludes:
          - "**/.DS_Store"

    # ── Linked frameworks ───────────────────────────────────────
    # libslic3r.xcframework is generated by script 11.
    # All other deps are linked via OTHER_LDFLAGS below.
    dependencies:
      - framework: libslic3r.xcframework
        embed: false    # static lib inside XCF — no embed needed
      - sdk: libc++.tbd

    # ── Build settings ──────────────────────────────────────────
    settings:
      base:
        # Bridging header — Swift ↔ C bridge
        SWIFT_OBJC_BRIDGING_HEADER: IosSlicer/IosSlicer-Bridging-Header.h

        # C++ standard (must match how libslic3r was compiled)
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        CLANG_CXX_LIBRARY: libc++

        # Search paths — point at our iOS sysroot
        HEADER_SEARCH_PATHS: >-
          $(inherited)
          $(HOME)/ios-sysroot-sim/include
          $(HOME)/ios-sysroot-sim/include/eigen3
          $(HOME)/ios-sysroot-sim/include/LibBGCode
          $(HOME)/ios-sources/PrusaSlicer/src
          $(HOME)/ios-sources/PrusaSlicer/src/libslic3r
          $(HOME)/ios-sources/PrusaSlicer/bundled_deps

        LIBRARY_SEARCH_PATHS: >-
          $(inherited)
          $(HOME)/ios-sysroot-sim/lib

        # Link all static deps explicitly.
        OTHER_LDFLAGS: >-
          $(inherited)
          $(HOME)/ios-sysroot-sim/lib/libslic3r_cgal.a
          $(HOME)/ios-sysroot-sim/lib/libslic3r-arrange.a
          $(HOME)/ios-sysroot-sim/lib/libslic3r-arrange-wrapper.a
          $(HOME)/ios-sysroot-sim/lib/libadmesh.a
          $(HOME)/ios-sysroot-sim/lib/liblocalesutils.a
          $(HOME)/ios-sysroot-sim/lib/libminiz_static.a
          $(HOME)/ios-sysroot-sim/lib/libqoi.a
          $(HOME)/ios-sysroot-sim/lib/libglu-libtess.a
          $(HOME)/ios-sysroot-sim/lib/libsemver.a
          $(HOME)/ios-sysroot-sim/lib/libclipper.a
          $(HOME)/ios-sysroot-sim/lib/libClipper2.a
          $(HOME)/ios-sysroot-sim/lib/libClipper2Z.a
          $(HOME)/ios-sysroot-sim/lib/libbgcode_core.a
          $(HOME)/ios-sysroot-sim/lib/libbgcode_binarize.a
          $(HOME)/ios-sysroot-sim/lib/libbgcode_convert.a
          $(HOME)/ios-sysroot-sim/lib/libheatshrink.a
          $(HOME)/ios-sysroot-sim/lib/libheatshrink_dynalloc.a
          $(HOME)/ios-sysroot-sim/lib/libqhullstatic_r.a
          $(HOME)/ios-sysroot-sim/lib/libqhullcpp.a
          $(HOME)/ios-sysroot-sim/lib/libmpfr.a
          $(HOME)/ios-sysroot-sim/lib/libgmpxx.a
          $(HOME)/ios-sysroot-sim/lib/libgmp.a
          $(HOME)/ios-sysroot-sim/lib/libboost_atomic.a
          $(HOME)/ios-sysroot-sim/lib/libboost_chrono.a
          $(HOME)/ios-sysroot-sim/lib/libboost_date_time.a
          $(HOME)/ios-sysroot-sim/lib/libboost_filesystem.a
          $(HOME)/ios-sysroot-sim/lib/libboost_iostreams.a
          $(HOME)/ios-sysroot-sim/lib/libboost_log.a
          $(HOME)/ios-sysroot-sim/lib/libboost_log_setup.a
          $(HOME)/ios-sysroot-sim/lib/libboost_nowide.a
          $(HOME)/ios-sysroot-sim/lib/libboost_program_options.a
          $(HOME)/ios-sysroot-sim/lib/libboost_regex.a
          $(HOME)/ios-sysroot-sim/lib/libboost_system.a
          $(HOME)/ios-sysroot-sim/lib/libboost_thread.a
          $(HOME)/ios-sysroot-sim/lib/libboost_locale.a
          $(HOME)/ios-sysroot-sim/lib/libtbb.a
          $(HOME)/ios-sysroot-sim/lib/libtbbmalloc.a
          $(HOME)/ios-sysroot-sim/lib/libexpat.a
          $(HOME)/ios-sysroot-sim/lib/libpng.a
          $(HOME)/ios-sysroot-sim/lib/libz.a

        # No bitcode (deprecated in Xcode 14+; required OFF for cross-compiled libs)
        ENABLE_BITCODE: NO

        # Required for mixed Swift + C++ projects
        SWIFT_VERSION: 5.9

        # Simulator runs on Apple Silicon as arm64
        ARCHS: arm64
        VALID_ARCHS: arm64

        # Suppress warnings from libslic3r headers we don't own
        GCC_WARN_INHIBIT_ALL_WARNINGS: NO
        CLANG_WARN_EVERYTHING: NO

      debug:
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"

      release:
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        SWIFT_OPTIMIZATION_LEVEL: "-O"

    # ── Info.plist ──────────────────────────────────────────────
    info:
      path: IosSlicer/Info.plist
      properties:
        CFBundleDisplayName: IosSlicer
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"

        # Files app integration — shows app's Documents in the Files browser
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true

        # Required device capabilities
        UIRequiredDeviceCapabilities:
          - arm64

        # Orientations
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        # App targets both iPhone and iPad (iPad support is essentially free)
        UIDeviceFamily:
          - 1   # iPhone
          - 2   # iPad

        UILaunchScreen: {}
